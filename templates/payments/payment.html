
<form action="{% url 'create_payment' %}" method="post">

    {% csrf_token %}
    <button id="rzp-button1" type="submit">Pay</button>

    <script
        src="https://checkout.razorpay.com/v1/checkout.js"
        data-key="{{ key }}"
        data-amount="{{ amount }}"
        data-currency="INR"
        data-order_id="{{ id }}"
        data-buttontext="Pay ₹499"
        data-name="PriyaDarpan"
        data-description="Secure Payment - Thank you for visiting"
        data-image="https://example.com/your_logo.jpg"
        data-prefill.name="{{ request.user.username|default:'Deepak' }}"
        data-prefill.email="{{ request.user.email|default:'deepak@example.com' }}"
        data-prefill.contact="9000090000"
        data-theme.color="#2520ad"
        data-callback_url="http://127.0.0.1:8000{% url 'payment_status' %}"
    ></script>

    <input type="hidden" name="hidden">
</form>
