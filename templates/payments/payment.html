<form action="{% url 'create_payment' %}" method="post">
    {% csrf_token %}
    <button id="rzp-button1" type="button">Pay 499</button>
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "rzp_test_pr99iascS1WRtU",
    "amount": "{{ amount }}",
    "currency": "INR",
    "name": "PriyaDarpan",
    "description": "Test Transaction",
    "order_id": "{{ id }}",
    "redirect": true,
    //  keeping YOUR style
    "callback_url": "http://127.0.0.1:8000{% url 'payment_status' %}",

    "prefill": {
        "name": "Deepak",
        "email": "deepak@example.com",
        "contact": "9000090000"
    },

    "notes": {
        "address": "Razorpay Corporate Office"
    },

    "theme": {
        "color": "#3399cc"
    }
};

var rzp1 = new Razorpay(options);

document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open(); 
    e.preventDefault();
}
</script>
